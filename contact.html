<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Contact — Giang Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Marope&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--yellow);
      color: var(--green);
    }

    .contact-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-top: 7rem;
    }

    .contact-left {
      padding: 5rem 4rem 5rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-title {
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s ease both;
    }

    .contact-email {
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      opacity: 0.65;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.8s ease 0.05s both;
    }

    .contact-email a {
      color: var(--green);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .contact-form {
      animation: fadeUp 0.9s ease 0.1s both;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      opacity: 0.6;
      margin-bottom: 0.4rem;
      display: block;
    }

    .form-label span {
      opacity: 0.5;
      font-size: 0.7rem;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: rgba(23, 56, 35, 0.07);
      border: none;
      border-radius: 2px;
      padding: 0.85rem 1rem;
      font-family: 'Marope', Georgia, serif;
      font-size: 1rem;
      color: var(--green);
      outline: none;
      transition: background 0.2s;
    }

    .form-input:focus,
    .form-textarea:focus {
      background: rgba(23, 56, 35, 0.12);
    }

    .form-textarea {
      resize: vertical;
      min-height: 130px;
    }

    .form-submit {
      display: inline-block;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1rem 2.2rem;
      background: var(--green);
      color: var(--cream);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }

    .form-submit:hover {
      opacity: 0.82;
    }

    .contact-right {
      position: relative;
      overflow: hidden;
    }

    .contact-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media(max-width:768px) {
      .contact-page {
        grid-template-columns: 1fr;
        padding-top: 6rem;
      }

      .contact-left {
        padding: 3rem 1.5rem;
      }

      .contact-right {
        display: none;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="theme-yellow">
  <nav id="nav">
    <a href="index.html" class="nav-logo">Giang Do</a>
    <ul class="nav-links">
      <li><a href="index.html#work">UX Design</a></li>
      <!-- <li><a href="ux-industry.html">UX Industry Work</a></li> -->
      <li><a href="graphic-design.html">Graphic Design</a></li>
      <li><a href="cv.html">CV</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="nav-mobile-overlay" id="mobileMenu">
    <button class="nav-overlay-close" onclick="closeMenu()" aria-label="Close menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <a href="index.html#work" onclick="closeMenu()">UX Design</a>
    <!-- <a href="ux-industry.html" onclick="closeMenu()">UX Industry Work</a> -->
    <a href="graphic-design.html" onclick="closeMenu()">Graphic Design</a>
    <a href="cv.html" onclick="closeMenu()">CV</a>
    <a href="about.html" onclick="closeMenu()">About</a>
    <a href="contact.html" onclick="closeMenu()">Contact</a>
  </div>
  <main class="contact-page">
    <div class="contact-left">
      <h1 class="contact-title">Contact</h1>
      <p class="contact-email">Email: <a href="mailto:giangdo0517@gmail.com">giangdo0517@gmail.com</a></p>
      <!-- For real form submissions, sign up at formspree.io and replace action="#" with your endpoint -->
      <form class="contact-form" action="https://formspree.io/f/mvzvdwva" method="POST">
        <div class="form-row">
          <div>
            <label class="form-label">First Name <span>(required)</span></label>
            <input type="text" class="form-input" name="first_name" />
          </div>
          <div>
            <label class="form-label">Last Name <span>(required)</span></label>
            <input type="text" class="form-input" name="last_name" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span>(required)</span></label>
          <input type="email" class="form-input" name="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Message <span>(required)</span></label>
          <textarea class="form-textarea" name="message"></textarea>
        </div>
        <button class="form-submit">Send</button>
        <input type="hidden" name="_next" value="https://giangdo.design/contact.html?sent=true" />
      </form>

    </div>
    <div class="contact-right"></div>
  </main>
  <footer>© 2026 Giang Do</footer>
  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    function closeMenu() {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
      document.body.style.overflow = '';
    }
    hamburger.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });
    const obs = new IntersectionObserver(entries => entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    }), { threshold: 0.08 });
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  </script>
</body>

</html>
